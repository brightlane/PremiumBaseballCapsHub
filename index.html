<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hats.com Baseball Caps Store | Premium Selection, Fast Shipping</title>
  <meta name="description" content="Shop premium baseball caps at Hats.com. 10K+ selection, 2-day shipping, 30-day returns. Beats Amazon, New Era, Lids. MLB licensed.">
  <link rel="canonical" href="https://www.linkconnector.com/ta.php?lc=007949000012003621&atid=HatsWebWebWeb&url=https%3A%2F%2Fhats.com%2F%3Fq%3Dstacked%2Bbaseball%2Bcap" />
  <style>/* Same styles as previous - keeping it compact */</style>
</head>
<body>
  <!-- Exit Modal - ONLY triggers after returning from hats.com contact page -->
  <div id="contactExitModal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.95);z-index:9999;justify-content:center;align-items:center">
    <div style="background:#fff;border-radius:24px;padding:48px;max-width:520px;width:92%;text-align:center;box-shadow:0 40px 80px rgba(0,0,0,.7);position:relative">
      <span class="close" onclick="closeContactModal()" style="position:absolute;top:20px;right:28px;font-size:36px;cursor:pointer;color:#666;font-weight:900">&times;</span>
      <h2 style="color:#1a1a1a;margin-bottom:20px;font-size:2.2rem">🛑 Thanks for checking contact info!</h2>
      <p style="font-size:1.1rem;color:#444;margin-bottom:32px;line-height:1.6">
        While you're here, grab your perfect baseball cap from Hats.com:<br>
        <strong>⚡ 2-day shipping • 🆓 Free returns • 🏆 MLB authentic</strong>
      </p>
      <a href="https://www.linkconnector.com/ta.php?lc=007949000012003621&atid=HatsWebWebWeb&url=https%3A%2F%2Fhats.com%2F%3Fq%3Dstacked%2Bbaseball%2Bcap" target="_blank" class="cta" rel="sponsored" style="background:linear-gradient(135deg,#ff3b30,#ff7a18);color:#fff;padding:20px 40px;border-radius:50px;font-weight:900;font-size:1.2rem;text-decoration:none;display:inline-block;box-shadow:0 15px 35px rgba(255,59,48,.4)">🛒 Shop Baseball Caps Now</a>
    </div>
  </div>

  <!-- Rest of page content (hero, comparison, testimonials, etc. - identical to previous) -->
  <header><!-- navigation --></header>
  <main><!-- hero, sections --></main>
  <footer><!-- footer --></footer>

  <script>
    // Dynamic current year
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // Track if user visited contact page (using sessionStorage)
    let hasVisitedContact = sessionStorage.getItem('visitedHatsContact') === 'true';
    
    // Check on page load if they came back from contact page
    if (hasVisitedContact) {
      setTimeout(() => {
        showContactModal();
        sessionStorage.removeItem('visitedHatsContact'); // One-time use
      }, 1000); // 1 second delay after page loads
    }

    // Contact button handler
    document.getElementById('contactBtn').onclick = function(e) {
      e.preventDefault();
      // Mark that they're visiting contact page
      sessionStorage.setItem('visitedHatsContact', 'true');
      window.open('https://hats.com/pages/contact', '_blank');
    };

    function showContactModal() {
      document.getElementById('contactExitModal').style.display = 'flex';
    }

    function closeContactModal() {
      document.getElementById('contactExitModal').style.display = 'none';
    }

    // Close modal on outside click or ESC
    window.onclick = function(e) {
      if (e.target.id === 'contactExitModal') {
        closeContactModal();
      }
    };
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeContactModal();
    });
  </script>
</body>
</html>
