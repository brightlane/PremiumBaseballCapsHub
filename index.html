<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PremiumBaseballCapsHub | Premium Selection, Fast Shipping</title>
  <meta name="description" content="Shop premium baseball caps at PremiumBaseballCapsHub. 10K+ selection, 2-day shipping, 30-day returns.">
  <link rel="canonical" href="https://www.linkconnector.com/ta.php?lc=007949000012003621&atid=HatsWebWebWeb&url=https%3A%2F%2Fhats.com%2F%3Fq%3Dstacked%2Bbaseball%2Bcap" />
  <style>/* Your existing styles */</style>
</head>
<body>
  <!-- Your existing page content -->
  <header><!-- navigation --></header>
  <main><!-- hero, sections --></main>
  <footer>
    <a href="https://hats.com/pages/contact" class="contact-link" target="_blank">Contact Us</a> |
    <a href="#">Privacy</a> |
    <a href="#">Legal</a>
  </footer>

  <script>
    // 🔥 FIXED - Works on ANY page, shows page content immediately
    document.addEventListener('DOMContentLoaded', function() {
      
      // Check if they tried contacting hats.com (show popup if true)
      if (sessionStorage.getItem('triedContactHats') === 'true') {
        setTimeout(showContactModal, 1500);
        sessionStorage.removeItem('triedContactHats');
        return;
      }

      // Watch ALL clicks for hats.com contact links
      document.addEventListener('click', function(e) {
        const link = e.target.closest('a[href*="hats.com/pages/contact"]');
        if (link) {
          sessionStorage.setItem('triedContactHats', 'true');
        }
      });
    });

    function showContactModal() {
      // Create modal
      const modal = document.createElement('div');
      modal.id = 'contactExitModal';
      modal.style.cssText = `
        display:flex !important;
        position:fixed;
        top:0;left:0;width:100vw;height:100vh;
        background:rgba(0,0,0,.95);
        z-index:99999;
        justify-content:center;align-items:center;
        font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      `;
      
      modal.innerHTML = `
        <div style="
          background:#fff;
          border-radius:24px;
          padding:48px;
          max-width:520px;
          width:92%;
          text-align:center;
          box-shadow:0 40px 80px rgba(0,0,0,.7);
          position:relative;
          max-height:90vh;
          overflow:auto;
        ">
          <span class="close" onclick="closeContactModal()" style="
            position:absolute;top:20px;right:28px;
            font-size:36px;cursor:pointer;color:#666;
            font-weight:900;line-height:1;
          ">&times;</span>
          <h2 style="color:#1a1a1a;margin:0 0 20px 0;font-size:2.2rem;">
            🛑 Thanks for checking contact info!
          </h2>
          <p style="font-size:1.1rem;color:#444;margin-bottom:32px;line-height:1.6;">
            While you're here, grab your perfect baseball cap:<br>
            <strong>⚡ 2-day shipping • 🆓 Free returns • 🏆 MLB authentic</strong>
          </p>
          <a href="https://www.linkconnector.com/ta.php?lc=007949000012003621&atid=HatsWebWebWeb&url=https%3A%2F%2Fhats.com%2F%3Fq%3Dstacked%2Bbaseball%2Bcap" 
             target="_blank" rel="sponsored" 
             style="
              background:linear-gradient(135deg,#ff3b30,#ff7a18);
              color:#fff !important;
              padding:20px 40px;
              border-radius:50px;
              font-weight:900;
              font-size:1.2rem;
              text-decoration:none;
              display:inline-block;
              box-shadow:0 15px 35px rgba(255,59,48,.4);
            ">🛒 Shop Baseball Caps Now</a>
        </div>
      `;
      
      document.body.appendChild(modal);
    }

    function closeContactModal() {
      const modal = document.getElementById('contactExitModal');
      if (modal) modal.remove();
    }

    // Global close handlers
    document.addEventListener('click', (e) => {
      if (e.target.id === 'contactExitModal') closeContactModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeContactModal();
    });
  </script>
</body>
</html>
