name: Generate Blog Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Skip pip install step if no dependencies are required
      - name: Run generate blog script
        run: python generate_blog.py
