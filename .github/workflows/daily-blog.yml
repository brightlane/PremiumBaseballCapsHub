name: Daily Blog Writer

on:
  push:
    branches:
      - main  # Trigger when pushing to the main branch
  pull_request:
    branches:
      - main  # Trigger when there is a pull request to the main branch

jobs:
  build:
    runs-on: ubuntu-latest  # Using the latest Ubuntu runner

    steps:
      # Set up Python with a valid version (e.g., 3.9)
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # Set the correct version here

      # Check out the repository's code
      - name: Checkout code
        uses: actions/checkout@v3

      # Optional: Install dependencies if needed (e.g., requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Only if you have a requirements.txt file

      # Run your blog generation script (replace with your actual script)
      - name: Generate blog post
        run: |
          python daily_blog_writer.py  # Replace with your actual script file

      # Upload generated blog posts as an artifact (adjust the path as necessary)
      - name: Upload generated blog
        uses: actions/upload-artifact@v4
        with:
          name: generated-blogs
          path: ./generated_blogs/  # Change this path based on where your generated blogs are saved
